<svg width="680" height="200" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ast-surgeon banner</title>
  <desc>ast-surgeon – AST-based semantic search for codebases</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#0e1a2e"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="680" height="200" fill="url(#bg)"/>

  <circle cx="580" cy="40" r="90" fill="#7c3aed" fill-opacity="0.08"/>
  <circle cx="100" cy="170" r="70" fill="#0ea5e9" fill-opacity="0.07"/>

  <text x="34" y="38" font-family="monospace" font-size="11" fill="#6d28d9" fill-opacity="0.5" letter-spacing="1">def index_project(path):</text>
  <text x="34" y="54" font-family="monospace" font-size="11" fill="#6d28d9" fill-opacity="0.3" letter-spacing="1">  chunks = parse_ast(path)</text>
  <text x="34" y="70" font-family="monospace" font-size="11" fill="#6d28d9" fill-opacity="0.15" letter-spacing="1">  embed(chunks) → store</text>

  <text x="340" y="115" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#txt)" letter-spacing="-3">ast-surgeon</text>

  <rect x="34" y="130" width="200" height="1" fill="url(#line)"/>

  <text x="340" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="0.5">AST-based code chunking, embedding &amp; semantic search</text>

  <g transform="translate(218, 172)">
    <rect width="74" height="22" rx="11" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="37" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">tree-sitter</text>
  </g>
  <g transform="translate(300, 172)">
    <rect width="82" height="22" rx="11" fill="#0369a1" fill-opacity="0.2" stroke="#38bdf8" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="41" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#7dd3fc">chromadb</text>
  </g>
  <g transform="translate(390, 172)">
    <rect width="56" height="22" rx="11" fill="#065f46" fill-opacity="0.2" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="28" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">voyage</text>
  </g>
</svg>
